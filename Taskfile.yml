version: "3"

tasks:
  default:
    desc: Show available tasks
    cmds: [task --list]
  test:
    desc: Run all tests
    cmds: [go test ./...]
  test:race:
    desc: Run all tests with the race detector
    cmds: [go test -race ./...]
  test:coverage:
    desc: Run tests with coverage report
    cmds:
      - go test -race -coverprofile=cover.out ./...
      - go tool cover -html=cover.out -o cover.html
  vet:
    desc: Run go vet
    cmds: [go vet ./...]
  lint:
    desc: Run golangci-lint
    cmds: [golangci-lint run ./...]
  tidy:
    desc: Run go mod tidy
    cmds: [go mod tidy]
  build:
    desc: Compile-check
    cmds: [go build ./...]
  ci:
    desc: Full local CI suite (vet + race tests)
    cmds:
      - task: vet
      - task: test:race
  clean:
    cmds: [rm -f cover.out cover.html]
